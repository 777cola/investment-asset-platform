<!DOCTYPE html>
<html>
<head>
    <title>Reset Passwords</title>
</head>
<body>
    <h1>Reset Passwords</h1>
    <p>Click the button below to reset the stored data and fix password hashing issue.</p>
    <button onclick="resetData()">Reset Data</button>
    <script>
        function resetData() {
            localStorage.removeItem('cj-capital-v2-data');
            localStorage.removeItem('cj-login-attempts');
            alert('Data reset successfully! Please close this tab and go back to the login page.');
        }
    </script>
</body>
</html>
