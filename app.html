<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>恺皓资本 · 资产管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (async function() {
        // ============================================================
        // 【版本号管理】
        // 每次更新代码后，请修改此版本号以触发自动缓存刷新
        // 格式：年份+月份+日期+修订号，例如：20260510.1
        // 修改后用户访问时会自动清除 localStorage/sessionStorage 并刷新页面
        // ============================================================
        const CURRENT_VERSION = "20260627.1";
        const CACHE_KEY = "kh-capital-version";
        
        const savedVersion = localStorage.getItem(CACHE_KEY);
        
        if (savedVersion !== CURRENT_VERSION) {
          localStorage.clear();
          sessionStorage.clear();
          localStorage.setItem(CACHE_KEY, CURRENT_VERSION);
          window.location.href = window.location.href + '?v=' + CURRENT_VERSION;
          return;
        }
        
        window.__ASSET_VERSION__ = CURRENT_VERSION;
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `./styles.css?v=${window.__ASSET_VERSION__}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-grid"></div>
    </div>

    <div class="app-shell">
      <header class="navbar">
        <button id="hamburger-btn" class="hamburger-btn" title="菜单" aria-label="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="navbar-brand">
          <div class="brand-logo"><span>KH</span></div>
          <div class="brand-text">
            <div class="logo-title">恺皓资本</div>
            <div class="logo-subtitle">KaiHao Capital</div>
          </div>
        </div>
        <div id="topbar-meta" class="topbar-meta"></div>
        <div class="navbar-controls">
          <button id="theme-toggle" class="icon-btn" title="切换主题">
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button id="lang-toggle" class="icon-btn" title="语言">
            <span id="lang-label">简体</span>
          </button>
          <div id="session-area"></div>
        </div>
      </header>

      <!-- 侧栏遮罩（手机端） -->
      <div id="sidebar-overlay" class="sidebar-overlay"></div>

      <div id="flash-message" class="flash hidden" role="status" aria-live="polite"></div>

      <main class="workspace">
        <aside id="sidebar" class="sidebar"></aside>
        <section id="main-view" class="content-area"></section>
      </main>

      <!-- 底部导航栏（手机端） -->
      <nav id="mobile-bottom-nav" class="mobile-bottom-nav" aria-label="底部导航">
        <button class="mobile-nav-btn" data-mobile-nav="overview" data-action="mobile-nav-overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>总览</span>
        </button>
        <button class="mobile-nav-btn" data-mobile-nav="products" data-action="mobile-nav-products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>产品</span>
        </button>
        <button class="mobile-nav-btn" data-mobile-nav="interest" data-action="mobile-nav-interest">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 12 15 20 7"/><polyline points="4 15 12 23 20 15"/>
          </svg>
          <span>收益</span>
        </button>
        <button class="mobile-nav-btn" data-mobile-nav="investors" data-action="mobile-nav-investors">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>投资者</span>
        </button>
        <button class="mobile-nav-btn logout-btn" data-mobile-nav="logout" data-action="mobile-nav-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>退出</span>
        </button>
      </nav>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" />
    <input type="file" id="import-excel-file" accept=".xlsx,.xls" style="display:none" />

    <script type="module">
      await import(`./app.js?v=${window.__ASSET_VERSION__}`);
    </script>
  </body>
</html>
