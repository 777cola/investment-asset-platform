<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复登录问题</title>
    <style>
        body {
            font-family: 'DM Sans', 'PingFang SC', -apple-system, sans-serif;
            background: #0a0e14;
            color: #f9fafb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(17,24,39,0.96);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(24px);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: #ff7d00;
        }
        p {
            margin-bottom: 24px;
            line-height: 1.6;
            color: rgba(249,250,251,0.65);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            padding: 0 20px;
            border-radius: 16px;
            border: 1px solid transparent;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 160ms cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #ff7d00, #cc6400);
            color: white;
            box-shadow: 0 6px 28px rgba(255,125,0,0.25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255,125,0,0.35);
        }
        .login-info {
            margin-top: 32px;
            padding: 16px;
            background: rgba(255,125,0,0.05);
            border: 1px solid rgba(255,125,0,0.2);
            border-radius: 12px;
            text-align: left;
        }
        .login-info h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff7d00;
        }
        .login-info p {
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: rgba(249,250,251,0.8);
        }
        .success {
            color: #22c55e;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>修复登录问题</h1>
        <p>点击下方按钮添加默认管理员账户和测试投资者账户，解决登录问题。</p>
        <button class="btn" onclick="runFix()">修复登录问题</button>
        <div id="result" class="success"></div>
        
        <div class="login-info">
            <h3>默认登录信息</h3>
            <p><strong>管理员账户：</strong>admin / admin123</p>
            <p><strong>投资者账户：</strong>测试用户 / 123456</p>
        </div>
    </div>
    
    <script src="fix-login.js"></script>
    <script>
        function runFix() {
            const result = document.getElementById('result');
            result.textContent = '正在修复...';
            
            // 执行修复
            fixLoginIssue();
        }
    </script>
</body>
</html>
