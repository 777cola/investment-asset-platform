<!DOCTYPE html>
<html>
<head>
    <title>清除本地存储</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>清除本地存储</h1>
        <p>点击按钮清除本地存储，然后系统会重新加载包含管理员账号的默认数据。</p>
        <button onclick="clearStorage()">清除本地存储</button>
        <button onclick="window.location.href='index.html'">返回登录页面</button>
    </div>
    <script>
        function clearStorage() {
            localStorage.removeItem('cj-capital-v2-data');
            localStorage.removeItem('cj-capital-v2-session');
            alert('本地存储已清除，系统将重新加载默认数据。');
        }
    </script>
</body>
</html>
