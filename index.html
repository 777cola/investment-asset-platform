<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>恺皓资本 · 资产管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-grid"></div>
    </div>

    <div class="app-shell">
      <header class="navbar">
        <div class="navbar-brand">
          <div class="brand-logo"><span></span>KH</span></div>
          <div class="brand-text">
            <div class="logo-title">恺皓资本</div>
            <div class="logo-subtitle">KaiHao Capital</div>
          </div>
        </div>
        <div id="topbar-meta" class="topbar-meta"></div>
        <div class="navbar-controls">
          <button id="theme-toggle" class="icon-btn" title="切换主题">
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button id="lang-toggle" class="icon-btn" title="切换语言">
            <span id="lang-label">EN</span>
          </button>
          <div id="session-area"></div>
        </div>
      </header>

      <div id="flash-message" class="flash hidden" role="status" aria-live="polite"></div>

      <main class="workspace">
        <aside id="sidebar" class="sidebar"></aside>
        <section id="main-view" class="content-area"></section>
      </main>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" />
    <input type="file" id="import-excel-file" accept=".xlsx,.xls" style="display:none" />

    <script type="module" src="./app.js"></script>
  </body>
</html>
