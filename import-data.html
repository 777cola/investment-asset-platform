<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入数据文件</title>
    <style>
        body {
            font-family: 'DM Sans', 'PingFang SC', -apple-system, sans-serif;
            background: #0a0e14;
            color: #f9fafb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(17,24,39,0.96);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(24px);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: #ff7d00;
            text-align: center;
        }
        .step {
            margin-bottom: 24px;
            padding: 20px;
            background: rgba(255,125,0,0.05);
            border: 1px solid rgba(255,125,0,0.2);
            border-radius: 12px;
        }
        .step h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff7d00;
        }
        .step p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 16px;
            color: rgba(249,250,251,0.65);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            padding: 0 20px;
            border-radius: 16px;
            border: 1px solid transparent;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 160ms cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #ff7d00, #cc6400);
            color: white;
            box-shadow: 0 6px 28px rgba(255,125,0,0.25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255,125,0,0.35);
        }
        .file-input {
            margin: 16px 0;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .status.success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .status.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
        }
        .data-info {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0,82,255,0.08);
            border: 1px solid rgba(0,82,255,0.2);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .data-info h4 {
            color: #3385ff;
            margin-bottom: 8px;
        }
        .data-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .data-info li {
            margin-bottom: 4px;
            color: rgba(249,250,251,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>导入数据文件</h1>
        
        <div class="step">
            <h3>导入 cj-capital-2026-04-20-2.json</h3>
            <p>选择并导入你提供的数据文件，将完整数据导入到新网站：</p>
            <div class="file-input">
                <input type="file" id="data-file" accept=".json" style="color: #f9fafb;">
            </div>
            <button class="btn" onclick="importData()">导入数据</button>
            <div id="import-status" class="status"></div>
        </div>
        
        <div id="data-preview" class="data-info" style="display: none;">
            <h4>数据预览</h4>
            <ul id="data-details"></ul>
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = "cj-capital-v2-data";
        
        function importData() {
            const fileInput = document.getElementById('data-file');
            const status = document.getElementById('import-status');
            const preview = document.getElementById('data-preview');
            const details = document.getElementById('data-details');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                status.innerHTML = '<div class="status error">请选择数据文件</div>';
                return;
            }
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            status.innerHTML = '<span style="color: #f9fafb;">导入中...</span>';
            
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // 验证数据结构
                    if (!data.investors || !data.adminUsers || !data.products) {
                        throw new Error('数据结构无效');
                    }
                    
                    // 保存数据
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    
                    // 显示数据预览
                    const investorCount = data.investors.length;
                    const adminCount = data.adminUsers.length;
                    const productCount = data.products.length;
                    
                    details.innerHTML = `
                        <li>管理员: ${adminCount} 个</li>
                        <li>投资者: ${investorCount} 个</li>
                        <li>产品: ${productCount} 个</li>
                        <li>数据日期: ${data.snapshotDate}</li>
                    `;
                    preview.style.display = 'block';
                    
                    status.innerHTML = `
                        <div class="status success">
                            ✓ 数据导入成功！<br>
                            已导入 ${investorCount} 个投资者，${adminCount} 个管理员，${productCount} 个产品
                            <br><br>
                            <strong>现在可以登录新网站了！</strong>
                        </div>
                    `;
                    
                    // 3秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                    
                } catch (error) {
                    status.innerHTML = `<div class="status error">导入失败: ${error.message}</div>`;
                }
            };
            
            reader.onerror = function() {
                status.innerHTML = '<div class="status error">文件读取失败</div>';
            };
            
            reader.readAsText(file, 'utf-8');
        }
    </script>
</body>
</html>
